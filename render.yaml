services:
  - type: web
    name: bob-news-frontend
    env: node
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # e.g. https://bob-news.onrender.com

  - type: web
    name: bob-intelligence-backend
    env: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python -m playwright install chromium
    startCommand: cd backend && python main.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: INGEST_URL
        sync: false # e.g. https://bob-news-frontend.onrender.com/api/ingest
      - key: CRAWL_INTERVAL
        value: "3600"
      - key: PYTHON_VERSION
        value: 3.11.7
