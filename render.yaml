services:
  - type: web
    name: bob-news-frontend
    env: node
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_SITE_URL
        value: https://bob-a-tech-new-aggrigator.onrender.com
      - key: NEXT_PUBLIC_SITE_NAME
        value: Bob
      - key: NEXT_PUBLIC_SITE_DESCRIPTION
        value: SaaS-grade news intelligence. Curated technical signals from 20+ high-fidelity sources.
      - key: NEXT_PUBLIC_CONTACT_EMAIL
        value: contact@bobintelligence.dev

  - type: web
    name: bob-intelligence-backend
    env: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python -m playwright install chromium
    startCommand: cd backend && gunicorn main:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: INGEST_URL
        value: https://bob-a-tech-new-aggrigator.onrender.com/api/ingest
      - key: CRAWL_INTERVAL
        value: "3600"
      - key: PYTHON_VERSION
        value: 3.11.7
