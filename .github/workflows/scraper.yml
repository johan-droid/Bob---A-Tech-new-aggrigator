name: Daily Tech News Scraper

on:
  schedule:
    - cron: '0 6 * * *' # Run at 6 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }} # The Next.js API endpoint, e.g. https://your-vercel-app.com/api/ingest
        run: |
          cd scraper
          python main.py
