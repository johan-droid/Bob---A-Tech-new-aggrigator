name: Bob Intelligence Pipeline

on:
  schedule:
    - cron: '*/14 * * * *'   # Keep-Alive Ping (every 14 mins)
  workflow_dispatch:         # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend (Keep-Alive)
        run: |
          # Render free tier sleeps after 15 mins of inactivity.
          # This 14-minute ping ensures the autonomous crawler daemon 
          # running in the background on Render stays awake 24/7.
          curl -s https://bob-a-tech-new-aggrigator.onrender.com > /dev/null
          echo "Keep-alive ping sent to https://bob-a-tech-new-aggrigator.onrender.com"
